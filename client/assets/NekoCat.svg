<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="NekoCore">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square base -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="56" rx="28" fill="url(#glow)"/>
  <!-- Neural node constellation -->
  <!-- Center node -->
  <circle cx="64" cy="64" r="8" fill="#fff" opacity="0.95"/>
  <!-- Orbital nodes -->
  <circle cx="38" cy="42" r="5" fill="#fff" opacity="0.8"/>
  <circle cx="90" cy="42" r="5" fill="#fff" opacity="0.8"/>
  <circle cx="38" cy="86" r="5" fill="#fff" opacity="0.8"/>
  <circle cx="90" cy="86" r="5" fill="#fff" opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="64" y1="64" x2="38" y2="42" stroke="#fff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="90" y2="42" stroke="#fff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="38" y2="86" stroke="#fff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="90" y2="86" stroke="#fff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Outer ring connections -->
  <line x1="38" y1="42" x2="90" y2="42" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="90" y1="42" x2="90" y2="86" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="90" y1="86" x2="38" y2="86" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="38" y1="86" x2="38" y2="42" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Center glow ring -->
  <circle cx="64" cy="64" r="16" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
</svg>
