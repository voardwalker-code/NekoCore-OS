          <option value="untested">Untested</option>
          <option value="pass">Passed</option>

    .qa-progress { font-size: 13px; font-weight: 600; opacity: 0.8; }
    .qa-pass-count { font-size: 12px; color: #6fdc8c; }
    .qa-fail-count { font-size: 12px; color: #f5a0a8; }

    .qa-progress-bar-track {
      height: 4px; background: rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .qa-progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #28a745, #6fdc8c);
      transition: width 0.3s ease;
    }

    .qa-body {
      flex: 1; overflow-y: auto; padding: 8px 12px 20px;
    }

    /* Section */
    .qa-section {
      margin-bottom: 6px; border: 1px solid var(--border-color, rgba(255,255,255,0.06));
      border-radius: 8px; overflow: hidden;
    }
    .qa-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; cursor: pointer; user-select: none;
      background: var(--toolbar-bg, rgba(30,30,42,0.7));
      transition: background 0.15s;
    }
    .qa-section-header:hover { background: rgba(255,255,255,0.06); }
    .qa-section-arrow { font-size: 10px; transition: transform 0.2s; }
    .qa-section-header.qa-collapsed .qa-section-arrow { transform: rotate(-90deg); }
    .qa-section-title { font-size: 13px; font-weight: 600; flex: 1; }
    .qa-section-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
    }
    .qa-section-badge-done { background: rgba(40,167,69,0.2); color: #6fdc8c; }
    .qa-section-body { padding: 4px 0; }
    .qa-section-header.qa-collapsed + .qa-section-body { display: none; }

    /* Item row */
    .qa-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px 5px 20px; font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }
    .qa-item:last-child { border-bottom: none; }
    .qa-item:hover { background: rgba(255,255,255,0.03); }
    .qa-item-label { flex: 1; line-height: 1.4; }
    .qa-item-status {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      min-width: 60px; text-align: center;
    }
    .qa-status-untested { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); }
    .qa-status-pass { background: rgba(40,167,69,0.2); color: #6fdc8c; }
    .qa-status-fail { background: rgba(220,53,69,0.2); color: #f5a0a8; }
    .qa-item-actions { display: flex; gap: 4px; }
    .qa-item-actions .qa-btn { padding: 3px 8px; font-size: 11px; }
    .qa-item.qa-item-pass { opacity: 0.65; }
    .qa-item.qa-item-fail .qa-item-label { color: #f5a0a8; }
    .qa-item-time { font-size: 10px; opacity: 0.4; margin-left: 4px; }

    /* Hide filtered items */
    .qa-item.qa-hidden { display: none; }
    .qa-section.qa-hidden { display: none; }

    /* ══════════════════════════════════════════════════════
       STATE
       ══════════════════════════════════════════════════════ */
    const STORAGE_KEY = 'nekocore-qa-checklist-v1';
    let results = {};    // key = "sectionIdx:itemIdx" → { status: 'pass'|'fail'|'untested', ts: ISO }
    let collapsed = {};  // key = sectionIdx → bool

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { const d = JSON.parse(raw); results = d.results || {}; collapsed = d.collapsed || {}; }
      } catch (_) { /* ignore */ }
    }
    function saveToStorage() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ results, collapsed })); } catch (_) { /* ignore */ }
    }

    /* ══════════════════════════════════════════════════════
       DOM REFS
       ══════════════════════════════════════════════════════ */
    const $ = id => document.getElementById(id);
    const body       = $('qaBody');
    const progress   = $('qaProgress');
    const passCount  = $('qaPassCount');
    const failCount  = $('qaFailCount');
    const progFill   = $('qaProgressFill');
    const filterSel  = $('qaFilterStatus');
    const loadInput  = $('qaLoadInput');

    /* ══════════════════════════════════════════════════════
       RENDER
       ══════════════════════════════════════════════════════ */
    function totalItems() {
      let n = 0; CHECKLIST.forEach(s => n += s.items.length); return n;
    }

    function countByStatus(status) {
      return Object.values(results).filter(r => r.status === status).length;
    }

    function updateStats() {
      const total = totalItems();
      const passes = countByStatus('pass');
      const fails = countByStatus('fail');
      const tested = passes + fails;
      progress.textContent = tested + ' / ' + total;
      passCount.textContent = '✅ ' + passes;
      failCount.textContent = '❌ ' + fails;
      const pct = total > 0 ? (tested / total * 100) : 0;
      progFill.style.width = pct.toFixed(1) + '%';
    }

    function getKey(si, ii) { return si + ':' + ii; }
    function getResult(si, ii) { return results[getKey(si, ii)] || { status: 'untested', ts: null }; }

    function renderAll() {
      body.innerHTML = '';
      const filter = filterSel.value;

      CHECKLIST.forEach((section, si) => {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'qa-section';

        // Count section stats
        let secPass = 0, secFail = 0;
        section.items.forEach((_, ii) => {
          const r = getResult(si, ii);
          if (r.status === 'pass') secPass++;
          if (r.status === 'fail') secFail++;
        });
        const secTotal = section.items.length;
        const secTested = secPass + secFail;

        // Check if section has any visible items
        let hasVisible = false;
        if (filter === 'all') { hasVisible = true; }
        else {
          section.items.forEach((_, ii) => {
            const r = getResult(si, ii);
            if (filter === 'untested' && r.status === 'untested') hasVisible = true;
            if (filter === 'pass' && r.status === 'pass') hasVisible = true;
            if (filter === 'fail' && r.status === 'fail') hasVisible = true;
          });
        }
        if (!hasVisible) { sectionEl.classList.add('qa-hidden'); }

        // Header
        const header = document.createElement('div');
        header.className = 'qa-section-header' + (collapsed[si] ? ' qa-collapsed' : '');
        const badgeClass = secTested === secTotal && secTotal > 0 ? ' qa-section-badge-done' : '';
        header.innerHTML =
          '<span class="qa-section-arrow">▼</span>' +
          '<span class="qa-section-title">' + esc(section.section) + '</span>' +
          '<span class="qa-section-badge' + badgeClass + '">' + secTested + '/' + secTotal +
          (secFail > 0 ? ' · ' + secFail + ' fail' : '') + '</span>';
        header.addEventListener('click', () => {
          collapsed[si] = !collapsed[si];
          header.classList.toggle('qa-collapsed');
          saveToStorage();
        });
        sectionEl.appendChild(header);

        // Body
        const bodyEl = document.createElement('div');
        bodyEl.className = 'qa-section-body';

        section.items.forEach((item, ii) => {
          const key = getKey(si, ii);
          const r = getResult(si, ii);

          const row = document.createElement('div');
          row.className = 'qa-item';
          if (r.status === 'pass') row.classList.add('qa-item-pass');
          if (r.status === 'fail') row.classList.add('qa-item-fail');

          // Filter visibility
          if (filter !== 'all') {
            if (filter === 'untested' && r.status !== 'untested') row.classList.add('qa-hidden');
            if (filter === 'pass' && r.status !== 'pass') row.classList.add('qa-hidden');
            if (filter === 'fail' && r.status !== 'fail') row.classList.add('qa-hidden');
          }

          const label = document.createElement('span');
          label.className = 'qa-item-label';
          label.textContent = item;
          if (r.ts) {
            const timeEl = document.createElement('span');
            timeEl.className = 'qa-item-time';
            timeEl.textContent = new Date(r.ts).toLocaleString();
            label.appendChild(timeEl);
          }

          const statusEl = document.createElement('span');
          statusEl.className = 'qa-item-status qa-status-' + r.status;
          statusEl.textContent = r.status === 'pass' ? 'Pass' : r.status === 'fail' ? 'Fail' : '—';

          const actions = document.createElement('span');
          actions.className = 'qa-item-actions';

          const passBtn = document.createElement('button');
          passBtn.className = 'qa-btn qa-btn-pass' + (r.status === 'pass' ? ' qa-active' : '');
          passBtn.textContent = '✓ Pass';
          passBtn.addEventListener('click', () => {
            results[key] = { status: 'pass', ts: new Date().toISOString() };
            saveToStorage(); renderAll();
          });

          const failBtn = document.createElement('button');
          failBtn.className = 'qa-btn qa-btn-fail' + (r.status === 'fail' ? ' qa-active' : '');
          failBtn.textContent = '✗ Fail';
          failBtn.addEventListener('click', () => {
            results[key] = { status: 'fail', ts: new Date().toISOString() };
            saveToStorage(); renderAll();
            openBugReport(section, item, si, ii);
          });

          actions.appendChild(passBtn);
          actions.appendChild(failBtn);

          row.appendChild(label);
          row.appendChild(statusEl);
          row.appendChild(actions);
          bodyEl.appendChild(row);
        });

        sectionEl.appendChild(bodyEl);
        body.appendChild(sectionEl);
      });

      updateStats();
    }

    /* ══════════════════════════════════════════════════════
       BUG REPORT INTEGRATION
       ══════════════════════════════════════════════════════ */
    function openBugReport(section, itemText, si, ii) {
      // Switch to Bug Tracker tab
      if (typeof switchMainTab === 'function') {
        switchMainTab('bugtracker');
      }

      // Wait for bugtracker to be visible, then auto-create bug
      setTimeout(() => {
        const btStore = window.__bugtrackerStore;
        const btNewBtn = document.getElementById('btNewBugBtn');

        if (btStore && btNewBtn) {
          // Click "New Bug" to create a blank entry
          btNewBtn.click();

          // Pre-fill fields
          setTimeout(() => {
            const titleEl = document.getElementById('btTitle');
            const areaEl  = document.getElementById('btArea');
            const descEl  = document.getElementById('btDesc');
            const stepsEl = document.getElementById('btSteps');

            if (titleEl) titleEl.value = 'QA FAIL: ' + itemText;
            if (areaEl) {
              // Try to match area from checklist section
              const areaMap = section.area || 'Other';
              for (let i = 0; i < areaEl.options.length; i++) {
                if (areaEl.options[i].value === areaMap) { areaEl.selectedIndex = i; break; }
              }
            }
            if (descEl) descEl.value = 'Failed during QA Checklist testing.\n\nSection: ' + section.section + '\nTest Item: ' + itemText;
            if (stepsEl) stepsEl.value = '1. Open NekoCore OS\n2. Navigate to the relevant area\n3. Perform the test described above\n4. Observe the failure';

            // Trigger input events so bugtracker picks up changes
            [titleEl, areaEl, descEl, stepsEl].forEach(el => {
              if (el) el.dispatchEvent(new Event('input', { bubbles: true }));
            });
          }, 100);
        }
      }, 200);
    }

    /* ══════════════════════════════════════════════════════
       FILE SAVE / LOAD
       ══════════════════════════════════════════════════════ */
    function saveFile() {
      const data = {
        format: 'nekocore-qacheck-v1',
        savedAt: new Date().toISOString(),
        results: results,
        stats: {
          total: totalItems(),
          pass: countByStatus('pass'),
          fail: countByStatus('fail'),
          untested: totalItems() - countByStatus('pass') - countByStatus('fail')
        }
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'nekocore-qa-' + new Date().toISOString().slice(0,10) + '.qacheck.json';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.format !== 'nekocore-qacheck-v1') { alert('Not a valid QA checklist file.'); return; }
          results = data.results || {};
          saveToStorage();
          renderAll();
        } catch (err) { alert('Error loading file: ' + err.message); }
      };
      reader.readAsText(file);
    }

    /* ══════════════════════════════════════════════════════
       TOOLBAR EVENTS
       ══════════════════════════════════════════════════════ */
    $('qaSaveBtn').addEventListener('click', saveFile);
    $('qaLoadBtn').addEventListener('click', () => loadInput.click());
    loadInput.addEventListener('change', (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value = ''; });

    $('qaResetBtn').addEventListener('click', () => {
      if (!confirm('Reset all QA results? This cannot be undone.')) return;
      results = {};
      collapsed = {};
      saveToStorage();
      renderAll();
    });

    $('qaCollapseAllBtn').addEventListener('click', () => {
      CHECKLIST.forEach((_, i) => { collapsed[i] = true; });
      saveToStorage(); renderAll();
    });

    $('qaExpandAllBtn').addEventListener('click', () => {
      collapsed = {};
      saveToStorage(); renderAll();
    });

    filterSel.addEventListener('change', renderAll);

    /* ══════════════════════════════════════════════════════
       HELPERS
       ══════════════════════════════════════════════════════ */
    function esc(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    /* ══════════════════════════════════════════════════════
       INIT
       ══════════════════════════════════════════════════════ */
    loadFromStorage();
    renderAll();

    window.__qaChecklistStore = { results, CHECKLIST, renderAll };
  })();
  </script>
</div>
