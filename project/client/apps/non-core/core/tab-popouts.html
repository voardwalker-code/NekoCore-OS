<div class="tab-content" id="tab-popouts">
  <div class="settings-container">
    <div class="settings-section">
      <div class="settings-section-header">
        <h2>↗ Popout Manager</h2>
        <p>Open NekoCore apps in detached browser windows that remain usable even when the main shell window is minimized.</p>
      </div>

      <div class="config-card" style="padding:var(--space-4);margin-bottom:var(--space-4)">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-3);flex-wrap:wrap">
          <div>
            <div style="font-size:var(--text-sm);font-weight:700;color:var(--text-primary)">Detached windows</div>
            <div id="popoutManagerStatus" class="text-xs-c text-secondary-c" style="margin-top:var(--space-1)">Checking popout registry...</div>
          </div>
          <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">
            <button class="btn bg" type="button" onclick="if (typeof refreshPopoutManagerView === 'function') refreshPopoutManagerView(true)">Refresh</button>
            <button class="btn" type="button" onclick="if (typeof closeAllPopouts === 'function') closeAllPopouts()">Close All Popouts</button>
          </div>
        </div>
      </div>

      <div id="popoutManagerEmpty" class="placeholder-sm text-xs-c" style="display:none;margin-bottom:var(--space-3)">
        No popout-capable apps found.
      </div>

      <div id="popoutManagerGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:var(--space-3)"></div>
    </div>
  </div>
</div>
